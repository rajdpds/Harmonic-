<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Bento Player</title>
    <style>
        :root {
            --bg-black: #000000;
            --active-color: #f0a519; /* Dynamic */
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            width: 100%;
        }

        /* LEFT SIDE: SCROLLING SYSTEM */
        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-playing-zone {
            height: 140px;
            border-radius: 25px;
            padding: 20px;
            background-color: var(--active-color);
            transition: background 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .scroll-list {
            height: 400px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
        }

        /* Hide Scrollbar */
        .scroll-list::-webkit-scrollbar { width: 0px; }

        .song-card {
            min-height: 100px;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .song-card:hover { transform: scale(0.98); }

        /* RIGHT SIDE: SIDEBAR */
        .right-column {
            width: 300px;
            background-color: var(--active-color);
            border-radius: 25px;
            padding: 20px;
            transition: background 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .poster {
            background: white;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            transform: rotate(-10deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: black;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .controls {
            background: white;
            width: 90%;
            border-radius: 10px;
            margin-top: 40px;
            padding: 15px;
            color: black;
        }

        /* Waveform Animation */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 30px;
            margin-top: 10px;
        }

        .bar {
            width: 3px;
            height: 100%;
            background: white;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 25px; }
        }

        #player { display: none; }
    </style>
</head>
<body>

<div id="player"></div>

<div class="app-container">
    <div class="left-column">
        <div class="main-playing-zone" id="main-zone">
            <h2 id="main-title">Select a Song</h2>
            <p id="main-artist">Artist</p>
            <div class="wave-container">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
                </div>
        </div>

        <div class="scroll-list" id="song-list">
            </div>
    </div>

    <div class="right-column" id="sidebar">
        <div class="poster">POSTER</div>
        <div class="controls">
            <div style="height:4px; background:#ddd; margin-bottom:15px"></div>
            <div style="display:flex; justify-content: space-around; font-size:1.5rem">
                <span>⏮</span> <span onclick="togglePlay()" style="cursor:pointer">⏸</span> <span>⏭</span>
            </div>
        </div>
        <h3 id="side-title" style="margin-top:20px">Title</h3>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const songs = [
        { id: 'kJQP7kiw5Fk', title: 'Despacito', artist: 'Luis Fonsi', color: '#940424' },
        { id: 'fRh_vgS2dFE', title: 'Sorry', artist: 'Justin Bieber', color: '#33a88e' },
        { id: 'RgKAFK5djSk', title: 'See You Again', artist: 'Wiz Khalifa', color: '#e64a19' },
        { id: 'LsoLEjrDogU', title: 'Time', artist: 'Hans Zimmer', color: '#f2a613' },
        { id: '4NRXx6tfkRJ', title: 'Ameno', artist: 'ERA', color: '#940424' }
    ];

    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '0', width: '0' });
    }

    const listContainer = document.getElementById('song-list');

    // Generate cards
    songs.forEach(song => {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.style.backgroundColor = song.color;
        card.innerHTML = `<h3>${song.title}</h3><p>${song.artist}</p><span>▶</span>`;
        card.onclick = () => setActiveSong(song);
        listContainer.appendChild(card);
    });

    function setActiveSong(song) {
        // Update YouTube
        player.loadVideoById(song.id);

        // Update UI Colors
        document.documentElement.style.setProperty('--active-color', song.color);
        
        // Update Text
        document.getElementById('main-title').innerText = song.title;
        document.getElementById('main-artist').innerText = song.artist;
        document.getElementById('side-title').innerText = song.title;

        // Smoothly scroll the clicked card to top (optional effect)
        listContainer.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function togglePlay() {
        const state = player.getPlayerState();
        if (state === 1) player.pauseVideo();
        else player.playVideo();
    }
</script>

</body>
</html>
